services:
  calendarr:
    build: .
    image: calendarr:latest
    container_name: calendarr
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      TZ: Australia/Melbourne
      PORT: "3000"
      HOST: "0.0.0.0"
      CALENDARR_DB_PATH: /config/calendarr.db
    volumes:
      # Unraid: change ./config to /mnt/user/appdata/calendarr
      - ./config:/config
